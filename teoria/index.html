<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" , content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" type="text.css" href="assets/css/style.css">
</head>

<body>

    <header class="container-fluid bg-black p-2">
        <h1 class="text-center colorTitle">BOOTSTRAP- Giorno 1</h1>
    </header>

    <main class="container-lg">
        <h2 class="text-center colorTitle">Grid system senza specifiche</h2>
        <div class="row">
            <div class="col bg-primary">
                <h4>COLONNA 1</h4>
            </div>
            <div class="col bg-warning">
                <h4>COLONNA 2</h4>
            </div>
            <div class="col bg-success">
                <h4>COLONNA 3</h4>
            </div>
        </div>
        <h2 class="text-center colorTitle">Grid system 8+4</h2>
        <div class="row">
            <div class="col-8 bg-danger">
                <h4>COLONNA 1</h4>
            </div>
            <div class="col-4 bg-secondary">
                <h4>COLONNA 2</h4>
            </div>
        </div>
        <h2>Responsive semplice</h2>
        <div class="row">
            <div class="col-lg-8 bg-info">
                <h4>COLONNA 1</h4>
            </div>
            <div class="col-lg-4 bg-white">
                <h4>COLONNA 2</h4>
            </div>
        </div>
        <div class="row">
            <div class="col-xl-4 bg-primary">
                <h4>COLONNA 1</h4>
            </div>
            <div class="col-xl-4 bg-warning">
                <h4>COLONNA 2</h4>
            </div>
            <div class="col-xl-4 bg-success">
                <h4>COLONNA 3</h4>
            </div>
        </div>
        <h2 class="text-center colorTitle">Responsive multipli</h2>
        <div class="row">
            <div class="col-lg-6 col-xl-4 bg-primary">
                <h4>COLONNA 1</h4>
            </div>
            <div class="col-lg-6 col-xl-4 bg-warning">
                <h4>COLONNA 2</h4>
            </div>
            <div class="col-lg-12 col-xl-4 bg-success">
                <h4>COLONNA 3</h4>
            </div>
        </div>
        <hr />
        <div class="row">
            <div class="col-md-6 col-xl-4">
                <div class="card">
                    <div class="card-title bg-primary">
                        <h4>CARD 1</h4>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-xl-4">
                <div class="card">
                    <div class="card-title bg-warning">
                        <h4>CARD 2</h4>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-xl-4">
                <div class="card">
                    <div class="card-title bg-danger">
                        <h4>CARD 3</h4>
                    </div>
                </div>
            </div>
            <div class="col-md-12 col-xl-6">
                <div class="card">
                    <div class="card-title bg-success">
                        <h4>CARD 4</h4>
                    </div>
                </div>
            </div>
            <div class="col-md-12 col-xl-6">
                <div class="card">
                    <div class="card-title bg-secondary">
                        <h4>CARD 5</h4>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="assets/js/script.js"></script>

</html>
